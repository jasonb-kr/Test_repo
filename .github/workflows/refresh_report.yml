name: Refresh Jira Story Report

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report files
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USERNAME: ${{ secrets.JIRA_USERNAME }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          QMETRY_URL: ${{ secrets.QMETRY_URL }}
          QMETRY_API_TOKEN: ${{ secrets.QMETRY_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
          TEAM_NAME: CS-FAAzureApps-BadAssets
          OUTPUT_DIR: output
        run: python run_report.py

      - name: Commit refreshed report output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/stories.csv output/defects.csv output/stories.json output/defects.json
          git diff --cached --quiet || git commit -m "chore: refresh Jira report output"
          git push
